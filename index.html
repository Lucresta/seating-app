function App() {
  const [view,setView]=useState("home");
  const [roomId,setRoomId]=useState(null);

  const [bench,setBench]=useState({});
  const [activeSeat,setActiveSeat]=useState(null);
  const [search,setSearch]=useState("");
  const [loaded,setLoaded]=useState(false);
  const [confirmClear,setConfirmClear]=useState(false);
  const searchRef=useRef(null);

  const room=ROOMS.find(r=>r.id===roomId);
  const benchRoles=roomId==="wh"?WH_BENCH:STD_BENCH;
  const sk=n=>`${roomId}:${n}`;
  const getA=n=>asgn[sk(n)];
  const getB=id=>bench[`${roomId}:${id}`]||"";
  const assignedCount=roomId?Object.keys(asgn).filter(k=>k.startsWith(roomId+":")).length:0;

  useEffect(()=>{
    try{
      const a=localStorage.getItem("par_asgn");
      const b=localStorage.getItem("par_bench");
      if(a)setAsgn(JSON.parse(a));
      if(b)setBench(JSON.parse(b));
    }catch(e){}
    setLoaded(true);
  },[]);

  const save=(a,b)=>{
    try{
      localStorage.setItem("par_asgn",JSON.stringify(a));
      localStorage.setItem("par_bench",JSON.stringify(b));
    }catch(e){}
  };

  const assignMP=m=>{
    const na={...asgn,[sk(activeSeat)]:m};
    setAsgn(na);save(na,bench);
    setActiveSeat(null);setSearch("");
  };
  const clearSeat=n=>{
    const na={...asgn};delete na[sk(n)];
    setAsgn(na);save(na,bench);
    if(activeSeat===n){setActiveSeat(null);setSearch("");}
  };
  const clearRoom=()=>{
    if(!confirmClear){setConfirmClear(true);return;}
    const na=Object.fromEntries(Object.entries(asgn).filter(([k])=>!k.startsWith(roomId+":")));
    setAsgn(na);save(na,bench);
    setActiveSeat(null);setSearch("");
    setConfirmClear(false);
  };
  const updBench=(id,val)=>{
    const nb={...bench,[`${roomId}:${id}`]:val};
    setBench(nb);save(asgn,nb);
  };

  const suggestions=useMemo(()=>{
    if(!search.trim())return[];

      .sort((a,b)=>a.s.localeCompare(b.s)||a.f.localeCompare(b.f))

  useEffect(()=>{

          width:"100%",minHeight:58,padding:"4px 3px",
          border:isAct?"2px solid "+GD:"1.5px solid #ccc",
          borderRadius:5,

  function GridLayout({grid,colTemplate}){
    const cols=grid[0].length;
    const cells=[];
    grid.forEach((row,ri)=>{
      // Horizontal aisle — full width dashed divider
      if(row.every(c=>c===-1)){
        cells.push(
          <div key={`haisle-${ri}`} style={{gridColumn:`1 / span ${cols}`,height:14,display:"flex",alignItems:"center",margin:"2px 0"}}>
            <div style={{width:"100%",borderTop:"2px dashed #bbb"}}/>
          </div>
        );
        return;
      }
      let ci=0;
      while(ci<row.length){
        const cell=row[ci];
        if(cell==="ATT"){
          cells.push(<div key={`${ri}-${ci}`} style={{gridColumn:"span 3",background:"#ede8f5",border:"1px solid #9b6dbe",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",minHeight:52,fontSize:12,fontWeight:"bold",color:"#5b3f80",letterSpacing:1}}>ATTENDEES</div>);
          ci+=3;
        }else if(cell==="PRS"){
          cells.push(<div key={`${ri}-${ci}`} style={{gridColumn:"span 3",background:"#f5edda",border:"1px solid #b8942a",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",minHeight:52,fontSize:12,fontWeight:"bold",color:"#7a5c00",letterSpacing:1}}>PRESS</div>);
          ci+=3;
        }else if(cell===0){
          const isAisle=ci===3;
          cells.push(<div key={`${ri}-${ci}`} style={isAisle?{borderLeft:"2px dashed #ddd",height:"100%"}:{}}/>);
          ci++;
        }else{
          const side=ci<3?"opp":"gov";
          cells.push(<SeatBtn key={`${ri}-${ci}`} n={cell} side={side}/>);
          ci++;
        }
      }
    });
    return(
      <div style={{display:"grid",gridTemplateColumns:colTemplate,gap:6,alignItems:"stretch"}}>
        {cells}
      </div>
    );
  }

    return(

        <div onClick={()=>{setActiveSeat(null);setSearch("");}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:190}}/>

          )}
          {search.trim()&&suggestions.length===0&&(
            <div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:10}}>No members found for "{search}"</div>
          )}
        </div>
      </>
    );
  }

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:DG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');*{font-family:${FONT};box-sizing:border-box;}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:42,height:42,border:"3px solid "+GD,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.85s linear infinite"}}/>
      <div style={{color:GD,fontFamily:FONT,fontSize:14,letterSpacing:1}}>Loading…</div>
    </div>
  );

  if(view==="print"){
    const chairA=asgn[sk("chair")];
    const chairTF=chairA?fmtTF(chairA):null;

    // Print seat cell — same grid position as room view
    function PrintSeat({n,side}){
      const a=asgn[sk(n)];
      const tf=a?fmtTF(a):null;
      const wmark=side==="gov"?"GOVERNMENT":"OPPOSITION";
      const wcolor=side==="gov"?"#c0392b":"#005BAA";
      return(
        <div style={{
          border:"1px solid #bbb",borderRadius:3,padding:"3px 4px",
          minHeight:52,background:a?pc(a.p):"#fafafa",
          display:"flex",flexDirection:"column",justifyContent:"center",
          overflow:"hidden",position:"relative",
        }}>
          {!a&&(
            <span style={{
              position:"absolute",top:"50%",left:"50%",
              transform:"translate(-50%,-50%) rotate(-30deg)",
              fontSize:6,fontWeight:"800",color:wcolor,opacity:0.13,
              whiteSpace:"nowrap",pointerEvents:"none",userSelect:"none",letterSpacing:0.8,
            }}>{wmark}</span>
          )}
          {a?(
            <>
              <div style={{fontSize:9,fontWeight:"700",color:txtColor(a.p),lineHeight:1.2,wordBreak:"break-word"}}>
                {tf} <span style={{textTransform:"uppercase"}}>{a.s}</span>
              </div>
              <div style={{fontSize:7,color:txtColor(a.p),opacity:0.75,lineHeight:1.2,marginTop:1}}>{a.c}</div>
            </>
          ):null}
        </div>
      );
    }

    // Print grid layout
    function PrintGrid({grid,colTemplate}){
      const cols=grid[0].length;
      const cells=[];
      grid.forEach((row,ri)=>{
        if(row.every(c=>c===-1)){
          cells.push(
            <div key={`haisle-${ri}`} style={{gridColumn:`1 / span ${cols}`,height:10,display:"flex",alignItems:"center",margin:"1px 0"}}>
              <div style={{width:"100%",borderTop:"2px dashed #bbb"}}/>
            </div>
          );
          return;
        }
        let ci=0;
        while(ci<row.length){
          const cell=row[ci];
          if(cell==="ATT"){
            cells.push(<div key={`${ri}-${ci}`} style={{gridColumn:"span 3",background:"#ede8f5",border:"1px solid #9b6dbe",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",minHeight:52,fontSize:9,fontWeight:"bold",color:"#5b3f80"}}>ATTENDEES</div>);
            ci+=3;
          }else if(cell==="PRS"){
            cells.push(<div key={`${ri}-${ci}`} style={{gridColumn:"span 3",background:"#f5edda",border:"1px solid #b8942a",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",minHeight:52,fontSize:9,fontWeight:"bold",color:"#7a5c00"}}>PRESS</div>);
            ci+=3;
          }else if(cell===0){
            const isAisle=ci===3;
            cells.push(<div key={`${ri}-${ci}`} style={isAisle?{borderLeft:"2px dashed #ddd"}:{}}/>);
            ci++;
          }else{
            const side=ci<3?"opp":"gov";
            cells.push(<PrintSeat key={`${ri}-${ci}`} n={cell} side={side}/>);
            ci++;
          }
        }
      });
      return(
        <div style={{display:"grid",gridTemplateColumns:colTemplate,gap:4}}>
          {cells}
        </div>
      );
    }

    // Print bench row
    function PrintBench(){
      return(
        <div style={{marginTop:10,borderTop:"2px solid #1a472a",paddingTop:8,display:"grid",gridTemplateColumns:"repeat("+benchRoles.length+",1fr)",gap:4}}>
          {benchRoles.map(r=>{
            const isChair=r.id==="chair";
            return(
              <div key={r.id} style={{border:"1px solid #bbb",borderRadius:3,padding:"4px 6px",background:isChair&&chairA?pc(chairA.p):"#f5f5f5",minHeight:44,display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{fontSize:7,fontWeight:"bold",color:isChair&&chairA?txtColor(chairA.p)+"88":"#aaa",textTransform:"uppercase",letterSpacing:0.4,marginBottom:1}}>{r.label}</div>
                {isChair&&chairA&&(
                  <>
                    <div style={{fontSize:9,fontWeight:"700",color:txtColor(chairA.p),textTransform:"uppercase",lineHeight:1.2}}>{chairA.s}</div>
                    {chairTF&&<div style={{fontSize:7.5,color:txtColor(chairA.p),opacity:0.9}}>{chairTF}</div>}
                  </>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    return(
      <div style={{minHeight:"100vh",background:"#fff",padding:20,fontFamily:FONT}}>
        <style>{`@media print{.np{display:none!important}}@page{margin:1cm;size:A4 landscape}`}</style>
        <div className="np" style={{marginBottom:14,display:"flex",gap:8}}>
          <button onClick={()=>setView("room")} style={{...btnBase,background:G,color:"#fff"}}>← Back to room</button>
          <button onClick={()=>window.print()} style={{...btnBase,background:GD,color:DG}}>🖨 Print / Save PDF</button>
        </div>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:10,borderBottom:"2px solid #1a472a",paddingBottom:8}}>
          <div style={{fontSize:18,fontWeight:"700",color:"#1a472a"}}>{room.name}</div>
          <div style={{fontSize:11,color:"#999",marginTop:2}}>
            Seating Plan · {new Date().toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
          </div>
        </div>

        {/* Public Gallery label */}
        <div style={{textAlign:"center",fontSize:9,fontWeight:"bold",color:"#5b3f80",letterSpacing:2,marginBottom:8,textTransform:"uppercase",background:"#ede8f5",padding:"3px",borderRadius:3}}>Public Gallery</div>

        {/* Room grid */}
        {room.type==="grid"
          ?<PrintGrid grid={room.grid} colTemplate={room.cols}/>
          :(() => {
            const whSeats=Array.from({length:53},(_,i)=>i+1);
            const whAssigned=whSeats.filter(n=>asgn[sk(n)]);
            const side=n=>n<=5||n===12||n===13||n===14||n===15||n===16||(n>=21&&n<=36)?"opp":"gov";
            return(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 28px"}}>
                  {whAssigned.map(n=>{
                    const a=asgn[sk(n)];
                    const tf=fmtTF(a);
                    return(
                      <div key={n} style={{borderBottom:"1px solid #f0f0f0",paddingBottom:5,marginBottom:3,breakInside:"avoid"}}>
                        <strong style={{fontSize:13}}>{tf} <span style={{textTransform:"uppercase"}}>{a.s}</span></strong>
                        <div style={{fontSize:11,color:"#888"}}><span style={{color:pc(a.p),fontWeight:"bold"}}>{a.p}</span> — {a.c}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        }

        {/* Bench */}
        <PrintBench/>

        {/* Party colour key */}
        <div style={{marginTop:12,borderTop:"1px solid #eee",paddingTop:8,display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(PCLR).filter(([p])=>Object.keys(asgn).some(k=>k.startsWith(roomId+":")&&asgn[k]?.p===p)).map(([party,col])=>(
            <div key={party} style={{display:"flex",alignItems:"center",gap:4,fontSize:9}}>
              <div style={{width:10,height:10,borderRadius:2,background:col,border:"1px solid #ddd",flexShrink:0}}/>
              <span style={{color:"#555"}}>{party}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if(view==="home"){
    return(
      <div style={{minHeight:"100vh",background:DG,fontFamily:FONT}}>
        <div style={{background:"#060f08",padding:"22px 16px",textAlign:"center",boxShadow:"0 3px 12px rgba(0,0,0,0.5)"}}>
          <div style={{fontSize:10,color:GD,letterSpacing:5,marginBottom:5,opacity:0.7}}>UK PARLIAMENT</div>
          <div style={{fontSize:26,fontWeight:"bold",color:GD,letterSpacing:2}}>COMMITTEE SEATING</div>
          <div style={{fontSize:11,color:"#4a7a55",marginTop:6,letterSpacing:1}}>Select a committee room to begin</div>
        </div>
        <div style={{padding:"18px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {ROOMS.map(r=>{
            const cnt=Object.keys(asgn).filter(k=>k.startsWith(r.id+":")).length;
            return(
              <button key={r.id}
                onClick={()=>{setRoomId(r.id);setView("room");setActiveSeat(null);setSearch("");}}
                style={{background:cnt>0?CR:"#fff",border:cnt>0?"2px solid "+GD:"2px solid transparent",borderRadius:10,padding:"18px 14px",cursor:"pointer",textAlign:"left",fontFamily:FONT,boxShadow:"0 3px 12px rgba(0,0,0,0.25)",transition:"all 0.12s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.04)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.35)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 3px 12px rgba(0,0,0,0.25)";}}
              >
                <div style={{fontSize:15,fontWeight:"bold",color:G,marginBottom:5,lineHeight:1.3}}>{r.name}</div>
                <div style={{fontSize:13,color:"#999"}}>{r.seats} member seats</div>
                {cnt>0&&<div style={{fontSize:12,color:GD,fontWeight:"bold",marginTop:6}}>✓ {cnt} assigned</div>}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:GL,fontFamily:FONT}}>
      <div style={{background:DG,color:GD,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(0,0,0,0.5)"}}>
        <button onClick={()=>{setView("home");setActiveSeat(null);setSearch("");}} style={{background:"none",border:"1px solid "+GD+"55",color:GD,fontSize:16,cursor:"pointer",padding:"4px 10px",borderRadius:4}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:"bold",letterSpacing:0.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{room?.name}</div>
          <div style={{fontSize:12,opacity:0.6}}>{assignedCount} of {room?.seats} seats assigned</div>
        </div>
        <button onClick={()=>setView("print")} style={{...btnBase,background:GD,color:DG,fontSize:11}}>🖨 Print</button>
        {confirmClear
          ?<>
            <button onClick={clearRoom} style={{...btnBase,background:"#c0392b",color:"#fff",fontSize:11}}>Confirm</button>
            <button onClick={()=>setConfirmClear(false)} style={{...btnBase,background:"#888",color:"#fff",fontSize:11}}>Cancel</button>
          </>
          :<button onClick={clearRoom} style={{...btnBase,background:"#c0392b",color:"#fff",fontSize:11}}>Clear all</button>
        }
      </div>
      <div style={{background:"#d8d0e8",textAlign:"center",fontSize:10,fontWeight:"bold",color:"#5b3f80",padding:"5px",letterSpacing:2}}>PUBLIC GALLERY</div>
      <div style={{padding:12,paddingBottom:100}}>
        <div style={{background:CR,borderRadius:10,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,0.15)"}}>
          {room?.type==="grid"
            ?<GridLayout grid={room.grid} colTemplate={room.cols}/>
            :<WHLayout/>
          }
          <BenchArea/>
        </div>
      </div>
      <AssignPanel/>
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
